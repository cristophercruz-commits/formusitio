
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Compañeros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">
    <h1>Registro de Compañeros</h1>

    <form id="formulario">
        <input type="hidden" id="indice">

        <label>Nombre</label>
        <input type="text" id="nombre" required>

        <label>Apellido</label>
        <input type="text" id="apellido" required>

        <label>Edad</label>
        <input type="number" id="edad" required>

        <label>Curso</label>
        <input type="text" id="curso" required>

        <div class="botones">
            <button type="submit">Guardar</button>
            <button type="button" id="editar">Editar</button>
            <button type="button" id="eliminar">Eliminar</button>
        </div>
    </form>

    <h2>Lista de Compañeros</h2>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Curso</th>
            </tr>
        </thead>
        <tbody id="tablaDatos">

        </tbody>
    </table>

</div>

<script src="script.js"></script>

</body>
</html>
